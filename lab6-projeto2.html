  <script type="text/javascript">

];


const dataAxis = [];
const dataVariacao = [];

for (let ano = 2016; ano <= 2025; ano++) {
  const dadoAtual = datasetOriginal.find(d => d.ano === ano);
  const dadoAnterior = datasetOriginal.find(d => d.ano === (ano - 1));
  
  if (dadoAtual && dadoAnterior) {
    dataAxis.push(ano.toString());

    const variacao = dadoAtual.total_chuva_mm - dadoAnterior.total_chuva_mm;
    dataVariacao.push(Number(variacao.toFixed(1)));
  }
}

option = {

      },

    }
  ]
};


const zoomSize = 4;
myChart.on('click', function (params) {
  myChart.dispatchAction({
    type: 'dataZoom',
    xAxisIndex: 0,
    startValue: dataAxis[Math.max(params.dataIndex - Math.floor(zoomSize / 2), 0)],
    endValue: dataAxis[Math.min(params.dataIndex + Math.floor(zoomSize / 2), dataVariacao.length - 1)]
  });
});

    if (option && typeof option === 'object') {
      myChart.setOption(option);
    }

  </script>
